<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cálculo de Comisiones - Minicore</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .container {
            margin-top: 50px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row mb-4">
        <div class="col-12 text-center">
            <h1 class="display-5 fw-bold text-primary">Cálculo de Comisiones</h1>
            <p class="lead text-muted">Sistema de Gestión de Ventas y Comisiones</p>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card p-4">
                <h4 class="mb-3">Filtrar por Rango</h4>
                <form th:action="@{/calcular}" th:object="${rango}" method="post">
                    <div class="mb-3">
                        <label for="fechaInicio" class="form-label">Fecha Inicio:</label>
                        <input type="datetime-local" id="fechaInicio" th:field="*{fechaInicio}" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="fechaFin" class="form-label">Fecha Fin:</label>
                        <input type="datetime-local" id="fechaFin" th:field="*{fechaFin}" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Calcular</button>
                </form>
            </div>
        </div>

        <div class="col-md-8 mb-4">
            <div class="card p-4 h-100">
                <h4 class="mb-3">Resultados de Comisión</h4>
                
                <div th:if="${resultados != null}">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Vendedor</th>
                                    <th>Total Ventas</th>
                                    <th>Comisión Calculada</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="comision : ${resultados}">
                                    <td th:text="${comision.nombre}" class="fw-bold"></td>
                                    <td th:text="${'$ ' + #numbers.formatDecimal(comision.totalVentas, 1, 'COMMA', 2, 'POINT')}"></td>
                                    <td class="text-success fw-bold" th:text="${'$ ' + #numbers.formatDecimal(comision.comision, 1, 'COMMA', 2, 'POINT')}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div th:if="${#lists.isEmpty(resultados)}" class="alert alert-warning mt-3">
                        No se encontraron ventas para el rango seleccionado.
                    </div>
                </div>

                <div th:if="${resultados == null}" class="alert alert-info mt-3 d-flex align-items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-info-circle-fill me-2" viewBox="0 0 16 16">
                      <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                    </svg>
                    <div>
                        Seleccione un rango de fechas y presione 'Calcular' para ver los resultados.
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
